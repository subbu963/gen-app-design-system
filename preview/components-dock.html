<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
</head>
<body class="m-0 p-[22px] font-sans bg-window relative"
      style="background-image:radial-gradient(circle at 20% 30%,rgba(10,132,255,0.18),transparent 50%),radial-gradient(circle at 80% 80%,rgba(255,69,58,0.10),transparent 50%),radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:auto,auto,24px 24px">
  <div class="absolute right-[22px] bottom-[22px] w-[340px] border border-white/[0.08] rounded-xl flex flex-col"
       style="background:var(--vibrancy-dock);backdrop-filter:blur(30px) saturate(160%);-webkit-backdrop-filter:blur(30px) saturate(160%);box-shadow:0 12px 32px -8px rgba(0,0,0,0.55),0 4px 12px rgba(0,0,0,0.4)">
    <div class="px-3.5 py-2.5 flex items-center gap-2 border-b border-white/[0.06]">
      <div class="w-[22px] h-[22px] rounded-[6px] bg-accent inline-flex items-center justify-center text-white text-sm font-semibold">✦</div>
      <div class="text-sm text-fg1 font-semibold flex-1">Chat</div>
      <div class="text-fg2 text-xs">▾</div>
    </div>
    <div class="px-3.5 py-3 flex flex-col gap-2.5">
      <div class="max-w-[80%] px-3 py-2 rounded-[14px] text-sm leading-snug bg-accent text-white self-end rounded-br">Add a weather widget for Brooklyn</div>
      <div class="max-w-[80%] px-3 py-2 rounded-[14px] text-sm leading-snug self-start rounded-bl text-fg1" style="background:rgba(255,255,255,0.08)">Done. Pinned it top-left.</div>
    </div>
    <div class="p-2 border-t border-white/[0.06] flex gap-1.5 items-center">
      <input placeholder="Ask for a widget…" class="flex-1 border-none outline-none text-fg1 text-sm py-2 px-3 rounded-full font-sans" style="background:rgba(255,255,255,0.06)" />
      <button class="w-7 h-7 rounded-full bg-accent text-white border-none cursor-pointer text-sm">↑</button>
    </div>
  </div>
</body></html>
