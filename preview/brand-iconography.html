<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
<script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
</head>
<body class="m-0 p-[22px] min-h-[200px] font-sans bg-window">
  <div class="text-[10px] text-fg3 uppercase tracking-[0.06em] font-semibold mb-3.5">Lucide · 1.75px stroke · stands in for SF Symbols</div>
  <div class="grid grid-cols-8 gap-3.5">
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="message-circle" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">chat</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="plus" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">plus</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="settings" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">settings</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="cpu" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">cpu</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="network" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">network</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="puzzle" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">puzzle</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="file-text" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">logs</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="tag" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">tag</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="check" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">check</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="grip-vertical" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">grip</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="x" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">close</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="rotate-cw" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">retry</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="key" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">key</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="sparkles" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">sparkles</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="chevron-right" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">chev-r</div></div>
    <div class="flex flex-col items-center gap-1.5"><div class="w-9 h-9 rounded-sm bg-card flex items-center justify-center text-fg1 border border-soft"><i data-lucide="arrow-up" class="w-5 h-5"></i></div><div class="text-[9px] text-fg2 font-mono">send</div></div>
  </div>
  <script>lucide.createIcons();</script>
</body></html>
