<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
</head>
<body class="m-0 p-[22px] bg-window font-sans flex gap-[14px] items-stretch">
  <!-- Stock widget -->
  <div class="bg-card rounded-lg p-4 flex-1 flex flex-col gap-2 min-h-[160px] shadow-[inset_0_1px_0_rgba(255,255,255,0.04),0_1px_2px_rgba(0,0,0,0.35)]">
    <div class="flex items-center justify-between">
      <div class="text-sm text-fg2 font-medium">AAPL · Apple Inc.</div>
      <div class="text-fg3 text-base cursor-pointer leading-none">⋯</div>
    </div>
    <div class="text-4xl font-bold text-fg1 -tracking-[0.025em] leading-none" style="font-size:36px">$224.18</div>
    <div><span class="text-green font-semibold text-sm">▲ +2.34 (1.05%)</span> <span class="text-xs text-fg2">today</span></div>
    <svg viewBox="0 0 200 40" preserveAspectRatio="none" class="w-full h-10 mt-auto">
      <polyline fill="none" stroke="#30D158" stroke-width="2" points="0,32 18,28 34,30 50,22 66,24 84,18 100,20 118,12 134,14 150,10 168,6 200,4"/>
      <polyline fill="rgba(48,209,88,0.15)" stroke="none" points="0,32 18,28 34,30 50,22 66,24 84,18 100,20 118,12 134,14 150,10 168,6 200,4 200,40 0,40"/>
    </svg>
  </div>
  <!-- Weather widget -->
  <div class="bg-card rounded-lg p-4 flex-1 flex flex-col gap-2 min-h-[160px] shadow-[inset_0_1px_0_rgba(255,255,255,0.04),0_1px_2px_rgba(0,0,0,0.35)]">
    <div class="flex items-center justify-between">
      <div class="text-sm text-fg2 font-medium">Brooklyn, NY</div>
      <div class="text-fg3 text-base cursor-pointer leading-none">⋯</div>
    </div>
    <div class="flex items-center gap-3.5">
      <div class="w-10 h-10 rounded-full shadow-[0_0_24px_rgba(255,159,10,0.5)]" style="background:radial-gradient(circle,#FFD60A 0%,#FF9F0A 100%)"></div>
      <div>
        <div class="text-4xl font-bold text-fg1 -tracking-[0.025em] leading-none" style="font-size:36px">68°</div>
        <div class="text-xs text-fg2">Mostly sunny · feels 70°</div>
      </div>
    </div>
    <div class="mt-auto flex gap-2 text-[11px] text-fg2">
      <span>↑ 72°</span><span>↓ 58°</span><span class="ml-auto">3 min ago</span>
    </div>
  </div>
  <!-- Calendar widget -->
  <div class="bg-card rounded-lg p-4 flex-1 flex flex-col gap-2 min-h-[160px] shadow-[inset_0_1px_0_rgba(255,255,255,0.04),0_1px_2px_rgba(0,0,0,0.35)]">
    <div class="flex items-center justify-between">
      <div class="text-sm text-fg2 font-medium">Today · Wed 21 May</div>
      <div class="text-fg3 text-base cursor-pointer leading-none">⋯</div>
    </div>
    <div class="flex gap-2 text-sm py-1 border-b border-hairline"><div class="font-mono text-[11px] text-fg2 min-w-[42px]">10:30</div><div class="text-fg1">Design review</div></div>
    <div class="flex gap-2 text-sm py-1 border-b border-hairline"><div class="font-mono text-[11px] text-fg2 min-w-[42px]">14:00</div><div class="text-fg1">Dentist</div></div>
    <div class="flex gap-2 text-sm py-1"><div class="font-mono text-[11px] text-fg2 min-w-[42px]">18:45</div><div class="text-fg1">Dinner — Bar Pisellino</div></div>
  </div>
</body></html>
