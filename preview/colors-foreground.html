<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
</head>
<body class="m-0 p-[18px] bg-window font-sans">
  <div class="flex gap-[14px]">
    <!-- demo widget showing all 4 fg levels in real usage -->
    <div class="flex-[1.2] bg-card rounded-lg p-[14px] flex flex-col gap-2 shadow-[inset_0_1px_0_rgba(255,255,255,0.04)]">
      <div class="flex items-center justify-between">
        <div class="text-xs text-fg2 font-medium">AAPL · Apple Inc.</div>
        <div class="text-fg4 text-base leading-none">⋯</div>
      </div>
      <div class="text-[28px] font-bold text-fg1 -tracking-[0.025em] leading-none">$224.18</div>
      <div class="text-xs font-semibold text-green">▲ +2.34 (1.05%)</div>
      <svg viewBox="0 0 100 24" preserveAspectRatio="none" class="w-full h-[22px]">
        <polyline fill="none" stroke="#30D158" stroke-width="1.4" points="0,18 14,16 26,18 38,12 50,14 62,8 74,10 86,4 100,2"/>
        <polyline fill="rgba(48,209,88,0.15)" stroke="none" points="0,18 14,16 26,18 38,12 50,14 62,8 74,10 86,4 100,2 100,24 0,24"/>
      </svg>
      <div class="text-fg3 text-xs px-2.5 py-2 mt-auto bg-input border border-soft rounded-lg">Ask for another widget…</div>
    </div>

    <!-- legend -->
    <div class="w-[280px] flex flex-col gap-1.5">
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg bg-card"
           style="background:linear-gradient(90deg,rgba(255,255,255,0.04),transparent)">
        <div class="w-[26px] h-[26px] rounded-md shrink-0 bg-white"></div>
        <div>
          <div class="text-[11px] font-bold text-fg1">fg1</div>
          <div class="text-[10px] text-fg2 font-mono">#FFFFFF</div>
        </div>
        <div class="text-[10px] ml-auto text-fg2">primary · $224.18</div>
      </div>
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg bg-card">
        <div class="w-[26px] h-[26px] rounded-md shrink-0" style="background:rgba(235,235,245,0.6)"></div>
        <div>
          <div class="text-[11px] font-bold text-fg2">fg2</div>
          <div class="text-[10px] text-fg2 font-mono">rgba · 60%</div>
        </div>
        <div class="text-[10px] ml-auto text-fg2">secondary · AAPL</div>
      </div>
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg bg-card">
        <div class="w-[26px] h-[26px] rounded-md shrink-0" style="background:rgba(235,235,245,0.3)"></div>
        <div>
          <div class="text-[11px] font-bold text-fg3">fg3</div>
          <div class="text-[10px] text-fg2 font-mono">rgba · 30%</div>
        </div>
        <div class="text-[10px] ml-auto text-fg3">placeholder</div>
      </div>
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg bg-card">
        <div class="w-[26px] h-[26px] rounded-md shrink-0" style="background:rgba(235,235,245,0.18)"></div>
        <div>
          <div class="text-[11px] font-bold text-fg4">fg4</div>
          <div class="text-[10px] text-fg2 font-mono">rgba · 18%</div>
        </div>
        <div class="text-[10px] ml-auto text-fg4">disabled · ⋯</div>
      </div>
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg" style="background:linear-gradient(90deg,rgba(10,132,255,0.14),transparent)">
        <div class="w-[26px] h-[26px] rounded-md shrink-0 bg-accent"></div>
        <div>
          <div class="text-[11px] font-bold text-accent">accent</div>
          <div class="text-[10px] text-fg2 font-mono">#0A84FF</div>
        </div>
        <div class="text-[10px] ml-auto text-accent">CTA</div>
      </div>
      <div class="flex items-center gap-2.5 px-2.5 py-1.5 rounded-lg" style="background:linear-gradient(90deg,rgba(48,209,88,0.14),transparent)">
        <div class="w-[26px] h-[26px] rounded-md shrink-0 bg-green"></div>
        <div>
          <div class="text-[11px] font-bold text-green">green</div>
          <div class="text-[10px] text-fg2 font-mono">#30D158</div>
        </div>
        <div class="text-[10px] ml-auto text-green">▲ +2.34</div>
      </div>
    </div>
  </div>
</body></html>
