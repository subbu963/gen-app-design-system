<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
</head>
<body class="m-0 p-[22px] bg-window font-sans flex gap-[14px] min-h-[200px] relative">
  <div class="absolute inset-0" style="background:radial-gradient(circle at 20% 30%, rgba(10,132,255,0.35), transparent 40%), radial-gradient(circle at 70% 60%, rgba(255,69,58,0.30), transparent 45%), radial-gradient(circle at 50% 90%, rgba(48,209,88,0.30), transparent 40%)"></div>
  <div class="relative flex-1 rounded-lg p-3.5 flex flex-col gap-1.5 border border-white/[0.08]"
       style="background:rgba(28,28,30,0.72);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%)">
    <div class="text-xs font-semibold text-fg1">--blur-thin</div>
    <div class="text-[11px] text-fg2">blur(20) sat(140)</div>
    <div class="text-[11px] text-fg2">popover</div>
  </div>
  <div class="relative flex-1 rounded-lg p-3.5 flex flex-col gap-1.5 border border-white/[0.08]"
       style="background:rgba(44,44,46,0.86);backdrop-filter:blur(30px) saturate(160%);-webkit-backdrop-filter:blur(30px) saturate(160%)">
    <div class="text-xs font-semibold text-fg1">--blur-regular</div>
    <div class="text-[11px] text-fg2">blur(30) sat(160)</div>
    <div class="text-[11px] text-fg2">chat dock</div>
  </div>
  <div class="relative flex-1 rounded-lg p-3.5 flex flex-col gap-1.5 border border-white/[0.08]"
       style="background:rgba(58,58,60,0.92);backdrop-filter:blur(60px) saturate(180%);-webkit-backdrop-filter:blur(60px) saturate(180%)">
    <div class="text-xs font-semibold text-fg1">--blur-thick</div>
    <div class="text-[11px] text-fg2">blur(60) sat(180)</div>
    <div class="text-[11px] text-fg2">iOS sheet</div>
  </div>
</body></html>
