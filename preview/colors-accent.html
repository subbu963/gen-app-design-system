<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
</head>
<body class="m-0 p-5 bg-window font-sans flex gap-4 items-stretch">
  <!-- accent hero -->
  <div class="flex-[1.4] bg-accent rounded-lg p-[18px] flex flex-col justify-between min-h-[140px] text-white">
    <div class="text-[11px] font-semibold uppercase tracking-[0.08em] opacity-85">Accent · iOS systemBlue (dark)</div>
    <div>
      <div class="text-[22px] font-bold -tracking-[0.02em]">#0A84FF</div>
      <div class="font-mono text-[13px] opacity-85">Primary CTA · selection · focus</div>
    </div>
  </div>
  <!-- variants -->
  <div class="flex-1 flex flex-col gap-2.5">
    <div class="flex gap-2.5 items-center">
      <div class="w-9 h-9 rounded-[10px] shrink-0" style="background:var(--color-accent-press)"></div>
      <div class="flex flex-col gap-0.5">
        <div class="text-xs text-fg1 font-semibold">accent-press</div>
        <div class="text-[10px] text-fg2 font-mono">#409CFF</div>
      </div>
    </div>
    <div class="flex gap-2.5 items-center">
      <div class="w-9 h-9 rounded-[10px] shrink-0 border border-soft" style="background:var(--color-accent-tint)"></div>
      <div class="flex flex-col gap-0.5">
        <div class="text-xs text-fg1 font-semibold">accent-tint</div>
        <div class="text-[10px] text-fg2 font-mono">accent · 14%</div>
      </div>
    </div>
    <div class="flex gap-2.5 items-center">
      <div class="w-9 h-9 rounded-[10px] shrink-0 border border-soft" style="background:var(--color-accent-glow)"></div>
      <div class="flex flex-col gap-0.5">
        <div class="text-xs text-fg1 font-semibold">accent-glow</div>
        <div class="text-[10px] text-fg2 font-mono">accent · 28%</div>
      </div>
    </div>
  </div>
</body></html>
