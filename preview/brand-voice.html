<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<script src="../tailwind.js"></script>
</head>
<body class="m-0 p-[22px] min-h-[240px] font-sans bg-window flex flex-col gap-3.5">
  <div class="text-[11px] text-fg3 uppercase tracking-[0.06em] font-semibold">Voice — playful, terse, second-person</div>
  <div class="flex gap-4">
    <div class="flex-1 px-3.5 py-3 bg-card rounded-md flex flex-col gap-1.5">
      <div class="flex items-center gap-1.5 text-[11px] font-semibold text-green">
        <span class="w-3.5 h-3.5 rounded-full inline-flex items-center justify-center text-white text-[10px] bg-green">✓</span> Do
      </div>
      <div class="text-sm text-fg1 leading-snug">"Hi. Let's pick a brain."</div>
      <div class="text-sm text-fg1 leading-snug">"Groq blinked. Retry?"</div>
      <div class="text-sm text-fg1 leading-snug">"Toss this widget?"</div>
    </div>
    <div class="flex-1 px-3.5 py-3 bg-card rounded-md flex flex-col gap-1.5">
      <div class="flex items-center gap-1.5 text-[11px] font-semibold text-red">
        <span class="w-3.5 h-3.5 rounded-full inline-flex items-center justify-center text-white text-[10px] bg-red">✕</span> Don't
      </div>
      <div class="text-sm text-fg2 leading-snug">"Welcome to gen-app! Configure your settings to begin."</div>
      <div class="text-sm text-fg2 leading-snug">"Error: Request failed with status 503."</div>
      <div class="text-sm text-fg2 leading-snug">"Are you sure you want to delete this widget?"</div>
    </div>
  </div>
</body></html>
